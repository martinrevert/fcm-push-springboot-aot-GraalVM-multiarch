# Debug logging for native troubleshooting
logging.level.org.springframework=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.mariadb.jdbc=DEBUG
firebase.service-account-file=serviceAccountKey.json
spring.main.banner-mode=off
spring.threads.virtual.enabled=true

# Polling frequency in milliseconds
movie.polling.fixed-rate-ms=60000

# Database Configuration
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://192.168.86.29:3306/subscriptions?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Cordoba}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kodi}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kodi}

# Native image specific
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
